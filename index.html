<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PHANTOM // ACCESS</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #00ff00; padding: 20px; text-align: center; width: 300px; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 10px; width: 80%; margin-top: 10px; text-align: center; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        button:hover { background: #008800; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>PHANTOM // ACCESS</h1>
        <input type="text" id="userid" placeholder="ENTER_ID">
        <br>
        <button onclick="checkAccess()">AUTH_VERIFY</button>
    </div>

    <script>
        function checkAccess() {
            let id = document.getElementById('userid').value.trim();
            // ID yang diijinkan
            if(id === "Christ Admin") {
                window.location.href = "chat.html";
            } else {
                alert("ACCESS_DENIED // TERMINATING");
            }
        }
    </script>
</body>
</html>
