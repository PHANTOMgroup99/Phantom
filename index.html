<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { border: 1px solid #00ff00; padding: 20px; text-align: center; }
        input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin-top: 10px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>PHANTOM // ACCESS</h1>
        <input type="text" id="userid" placeholder="ENTER_UNIQUE_ID">
        <br>
        <button onclick="checkAccess()">AUTH_VERIFY</button>
    </div>

    <script>
        const validIDs = ["Christ Admin"PHANTOM_01", "PHANTOM_02"]; // ID ini bisa lo update kapan aja
        function checkAccess() {
            let id = document.getElementById('userid').value;
            if(validIDs.includes(id)) {
                alert("ACCESS_GRANTED");
                window.location.href = "chat.html"; // Nanti kita buat file chat.html nya
            } else {
                alert("ACCESS_DENIED // TERMINATING");
            }
        }
    </script>
</body>
</html>
